<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <meta name="description" content="{{ description }}">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    
    <style>
        /* Custom styles for the application */
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 2s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .step-indicator {
            transition: width 0.3s ease;
        }
        
        .form-card {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        
        .btn-primary {
            background-color: #3B82F6;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        
        .btn-primary:hover {
            background-color: #2563EB;
        }
        
        .btn-secondary {
            background-color: #6B7280;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        
        .btn-secondary:hover {
            background-color: #4B5563;
        }
        
        .input-field {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid #D1D5DB;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            transition: border-color 0.3s ease;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .error-message {
            color: #EF4444;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }
        
        .success-message {
            color: #10B981;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="app">
        <div v-if="loading" class="min-h-screen flex items-center justify-center">
            <div class="text-center">
                <div class="loading-spinner mx-auto mb-4"></div>
                <p class="text-gray-600">Loading application...</p>
            </div>
        </div>
        
        <div v-else class="min-h-screen">
            <!-- Header -->
            <header class="bg-white shadow-sm">
                <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                    <div class="flex justify-between items-center py-6">
                        <div class="flex items-center">
                            <h1 class="text-2xl font-bold text-gray-900">Student Application</h1>
                        </div>
                        <div class="flex items-center space-x-4">
                            <div class="text-sm text-gray-500">
                                Step {{"{{"}} currentStep {{"}}"}} of {{"{{"}} totalSteps {{"}}"}}
                            </div>
                            <div class="w-48 bg-gray-200 rounded-full h-2">
                                <div 
                                    class="bg-blue-600 h-2 rounded-full step-indicator"
                                    :style="{ width: `${{"{{"}}(currentStep / totalSteps) * 100{{"}}"}%` }"
                                ></div>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- Main Content -->
            <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                <div class="bg-white rounded-lg form-card p-6">
                    
                    <!-- Step 1: Guardian Information -->
                    <div v-if="currentStep === 1" class="space-y-6">
                        <div class="text-center">
                            <h2 class="text-xl font-semibold text-gray-900 mb-4">Guardian Information</h2>
                            <p class="text-gray-600">Please provide information about the parent or guardian</p>
                        </div>
                        
                        <!-- Guardian Type Selection -->
                        <div class="space-y-4">
                            <label class="block text-sm font-medium text-gray-700">Guardian Type</label>
                            <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
                                <button
                                    @click="guardianType = 'parent'"
                                    :class="[
                                        'relative rounded-lg border p-4 text-left transition-all duration-200',
                                        guardianType === 'parent' 
                                            ? 'border-blue-500 bg-blue-50 text-blue-900' 
                                            : 'border-gray-300 bg-white text-gray-900 hover:bg-gray-50'
                                    ]"
                                >
                                    <div class="flex items-center">
                                        <div class="flex-shrink-0">
                                            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                                            </svg>
                                        </div>
                                        <div class="ml-3">
                                            <p class="text-sm font-medium">Parent</p>
                                            <p class="text-xs text-gray-500">Father and Mother information</p>
                                        </div>
                                    </div>
                                </button>
                                <button
                                    @click="guardianType = 'guardian'"
                                    :class="[
                                        'relative rounded-lg border p-4 text-left transition-all duration-200',
                                        guardianType === 'guardian' 
                                            ? 'border-blue-500 bg-blue-50 text-blue-900' 
                                            : 'border-gray-300 bg-white text-gray-900 hover:bg-gray-50'
                                    ]"
                                >
                                    <div class="flex items-center">
                                        <div class="flex-shrink-0">
                                            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                            </svg>
                                        </div>
                                        <div class="ml-3">
                                            <p class="text-sm font-medium">Guardian</p>
                                            <p class="text-xs text-gray-500">Other guardian information</p>
                                        </div>
                                    </div>
                                </button>
                            </div>
                        </div>
                        
                        <!-- Forms content will be added here by another replacement -->
                    </div>
                    
                    <!-- Other steps will be added here -->
                    
                    <!-- Navigation Buttons -->
                    <div class="flex justify-between items-center mt-8 pt-6 border-t border-gray-200">
                        <button
                            v-if="currentStep > 1"
                            @click="previousStep"
                            class="btn-secondary"
                        >
                            ← Previous
                        </button>
                        <div v-else></div>
                        
                        <div class="flex space-x-3">
                            <button
                                v-if="currentStep < totalSteps"
                                @click="nextStep"
                                :disabled="!canProceed"
                                class="btn-primary"
                                :class="{ 'opacity-50 cursor-not-allowed': !canProceed }"
                            >
                                Next →
                            </button>
                            
                            <button
                                v-if="currentStep === totalSteps"
                                @click="submitApplication"
                                :disabled="isSubmitting"
                                class="btn-primary"
                                :class="{ 'opacity-50 cursor-not-allowed': isSubmitting }"
                            >
                                {{"{{"}} submitButtonText {{"}}"}}
                            </button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
        
        <!-- Notification System -->
        <div class="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 space-y-2 w-full max-w-md">
            <div
                v-for="notification in notifications"
                :key="notification.id"
                :class="[
                    'w-full bg-white shadow-lg rounded-lg pointer-events-auto ring-1 ring-black ring-opacity-5 transition-all duration-300',
                    notification.type === 'success' ? 'border-l-4 border-green-500' : '',
                    notification.type === 'error' ? 'border-l-4 border-red-500' : '',
                    notification.type === 'info' ? 'border-l-4 border-blue-500' : '',
                    notification.type === 'warning' ? 'border-l-4 border-yellow-500' : ''
                ]"
            >
                <div class="p-4">
                    <div class="flex items-start">
                        <div class="flex-shrink-0">
                            <!-- Success Icon -->
                            <svg v-if="notification.type === 'success'" class="h-5 w-5 text-green-400" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                            </svg>
                            <!-- Error Icon -->
                            <svg v-if="notification.type === 'error'" class="h-5 w-5 text-red-400" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                            </svg>
                            <!-- Info Icon -->
                            <svg v-if="notification.type === 'info'" class="h-5 w-5 text-blue-400" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/>
                            </svg>
                            <!-- Warning Icon -->
                            <svg v-if="notification.type === 'warning'" class="h-5 w-5 text-yellow-400" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
                            </svg>
                        </div>
                        <div class="ml-3 w-0 flex-1 pt-0.5">
                            <p class="text-sm font-medium text-gray-900" v-text="notification.message"></p>
                        </div>
                        <div class="ml-4 flex-shrink-0 flex">
                            <button
                                @click="removeNotification(notification.id)"
                                class="bg-white rounded-md inline-flex text-gray-400 hover:text-gray-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"
                            >
                                <span class="sr-only">Close</span>
                                <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Success Modal -->
        <div v-if="showSuccessModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50">
            <div class="relative top-20 mx-auto p-5 border w-96 shadow-lg rounded-md bg-white">
                <div class="mt-3 text-center">
                    <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100">
                        <svg class="h-6 w-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                        </svg>
                    </div>
                    <h3 class="text-lg leading-6 font-medium text-gray-900 mt-2">Application Submitted Successfully!</h3>
                    <div class="mt-2 px-7 py-3">
                        <p class="text-sm text-gray-500">
                            Your application has been submitted with ID: <strong v-text="submittedApplicationId"></strong>
                        </p>
                    </div>
                    <div class="items-center px-4 py-3 space-y-2">
                        <button
                            @click="addSibling"
                            class="btn-primary w-full"
                        >
                            Add Another Child
                        </button>
                        <button
                            @click="resetForm"
                            class="btn-secondary w-full"
                        >
                            Start New Application
                        </button>
                        <button
                            @click="finishAndDownload"
                            class="bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded-md transition-colors duration-200 w-full"
                        >
                            Finish & Download PDF
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/assets/education/www/apply.js"></script>
</body>
</html>
