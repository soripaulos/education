<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Push Notification Manager - MBS App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .notification-card {
            border-left: 4px solid #007bff;
            margin-bottom: 15px;
        }
        .notification-card.urgent {
            border-left-color: #dc3545;
        }
        .notification-card.high {
            border-left-color: #fd7e14;
        }
        .notification-card.normal {
            border-left-color: #28a745;
        }
        .notification-card.low {
            border-left-color: #6c757d;
        }
        .stats-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
        }
        .category-badge {
            font-size: 0.8em;
        }
        .loading {
            display: none;
        }
        .form-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container-fluid py-4">
        <div class="row">
            <div class="col-12">
                <h1 class="mb-4">
                    <i class="fas fa-bell text-primary"></i>
                    Push Notification Manager
                </h1>
            </div>
        </div>

        <!-- Statistics Cards -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card stats-card">
                    <div class="card-body text-center">
                        <i class="fas fa-paper-plane fa-2x mb-2"></i>
                        <h3 id="total-notifications">-</h3>
                        <p class="mb-0">Total Notifications</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stats-card">
                    <div class="card-body text-center">
                        <i class="fas fa-calendar-day fa-2x mb-2"></i>
                        <h3 id="sent-today">-</h3>
                        <p class="mb-0">Sent Today</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stats-card">
                    <div class="card-body text-center">
                        <i class="fas fa-mobile-alt fa-2x mb-2"></i>
                        <h3 id="active-tokens">-</h3>
                        <p class="mb-0">Active Devices</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stats-card">
                    <div class="card-body text-center">
                        <i class="fas fa-users fa-2x mb-2"></i>
                        <h3 id="total-tokens">-</h3>
                        <p class="mb-0">Total Devices</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Send Notification Form -->
        <div class="row">
            <div class="col-md-8">
                <div class="form-section">
                    <h4 class="mb-3">
                        <i class="fas fa-plus-circle text-success"></i>
                        Send New Notification
                    </h4>
                    
                    <form id="notification-form">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="title" class="form-label">Title *</label>
                                    <input type="text" class="form-control" id="title" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="category" class="form-label">Category *</label>
                                    <select class="form-control" id="category" required>
                                        <option value="general">General</option>
                                        <option value="academic">Academic</option>
                                        <option value="announcements">Announcements</option>
                                        <option value="urgent">Urgent</option>
                                        <option value="fees">Fees</option>
                                        <option value="attendance">Attendance</option>
                                        <option value="event">Event</option>
                                        <option value="exam">Exam</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="message" class="form-label">Message *</label>
                            <textarea class="form-control" id="message" rows="3" required></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="target-type" class="form-label">Target Audience *</label>
                                    <select class="form-control" id="target-type" required>
                                        <option value="all_students">All Students</option>
                                        <option value="specific_students">Specific Students</option>
                                        <option value="student_groups">Student Groups</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="priority" class="form-label">Priority</label>
                                    <select class="form-control" id="priority">
                                        <option value="low">Low</option>
                                        <option value="normal" selected>Normal</option>
                                        <option value="high">High</option>
                                        <option value="urgent">Urgent</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- Target Selection (Hidden by default) -->
                        <div id="target-selection" class="mb-3" style="display: none;">
                            <label class="form-label">Select Recipients</label>
                            <div id="target-options">
                                <!-- Dynamic content will be loaded here -->
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="include-parents">
                                    <label class="form-check-label" for="include-parents">
                                        Include Parents
                                    </label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="include-teachers">
                                    <label class="form-check-label" for="include-teachers">
                                        Include Teachers
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div class="mt-4">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="fas fa-paper-plane"></i>
                                Send Notification
                            </button>
                            <button type="button" class="btn btn-secondary btn-lg ms-2" onclick="sendTestNotification()">
                                <i class="fas fa-vial"></i>
                                Send Test
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="col-md-4">
                <div class="form-section">
                    <h4 class="mb-3">
                        <i class="fas fa-chart-pie text-info"></i>
                        Category Breakdown
                    </h4>
                    <div id="category-breakdown">
                        <p class="text-muted">Loading statistics...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recent Notifications -->
        <div class="row mt-4">
            <div class="col-12">
                <div class="form-section">
                    <h4 class="mb-3">
                        <i class="fas fa-history text-warning"></i>
                        Recent Notifications
                    </h4>
                    <div id="recent-notifications">
                        <p class="text-muted">Loading recent notifications...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Modal -->
    <div class="modal fade" id="loadingModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-body text-center">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-2 mb-0">Sending notification...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Global variables
        let students = [];
        let studentGroups = [];
        let loadingModal;

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            loadingModal = new bootstrap.Modal(document.getElementById('loadingModal'));
            loadStats();
            loadRecentNotifications();
            loadStudents();
            loadStudentGroups();
            
            // Setup event listeners
            document.getElementById('target-type').addEventListener('change', handleTargetTypeChange);
            document.getElementById('notification-form').addEventListener('submit', handleFormSubmit);
        });

        // Load statistics
        async function loadStats() {
            try {
                const response = await fetch('/api/method/education.education.api.push_notifications.get_notification_stats');
                const data = await response.json();
                
                if (data.message && data.message.success) {
                    const stats = data.message.stats;
                    document.getElementById('total-notifications').textContent = stats.total_notifications;
                    document.getElementById('sent-today').textContent = stats.sent_today;
                    document.getElementById('active-tokens').textContent = stats.active_tokens;
                    document.getElementById('total-tokens').textContent = stats.total_tokens;
                    
                    // Update category breakdown
                    updateCategoryBreakdown(stats.category_breakdown);
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // Update category breakdown
        function updateCategoryBreakdown(breakdown) {
            const container = document.getElementById('category-breakdown');
            if (Object.keys(breakdown).length === 0) {
                container.innerHTML = '<p class="text-muted">No data available</p>';
                return;
            }
            
            let html = '';
            for (const [category, count] of Object.entries(breakdown)) {
                html += `
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="badge bg-secondary category-badge">${category}</span>
                        <span class="fw-bold">${count}</span>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        // Load recent notifications
        async function loadRecentNotifications() {
            try {
                const response = await fetch('/api/method/education.education.api.push_notifications.get_notification_history');
                const data = await response.json();
                
                if (data.message && data.message.success) {
                    updateRecentNotifications(data.message.notifications);
                }
            } catch (error) {
                console.error('Error loading recent notifications:', error);
            }
        }

        // Update recent notifications display
        function updateRecentNotifications(notifications) {
            const container = document.getElementById('recent-notifications');
            
            if (notifications.length === 0) {
                container.innerHTML = '<p class="text-muted">No notifications sent yet</p>';
                return;
            }
            
            let html = '';
            notifications.forEach(notification => {
                const statusBadge = getStatusBadge(notification.status);
                const priorityClass = notification.priority || 'normal';
                
                html += `
                    <div class="card notification-card ${priorityClass}">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <h6 class="card-title mb-1">${notification.title}</h6>
                                    <p class="card-text text-muted small mb-2">${notification.message}</p>
                                    <div class="d-flex gap-2">
                                        <span class="badge bg-primary">${notification.category}</span>
                                        ${statusBadge}
                                    </div>
                                </div>
                                <div class="text-end">
                                    <small class="text-muted">${formatDate(notification.sent_at)}</small>
                                    <div class="mt-1">
                                        <small class="text-success">✓ ${notification.sent_count || 0}</small>
                                        <small class="text-danger ms-2">✗ ${notification.failed_count || 0}</small>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // Get status badge
        function getStatusBadge(status) {
            const badges = {
                'sent': '<span class="badge bg-success">Sent</span>',
                'failed': '<span class="badge bg-danger">Failed</span>',
                'sending': '<span class="badge bg-warning">Sending</span>',
                'draft': '<span class="badge bg-secondary">Draft</span>',
                'scheduled': '<span class="badge bg-info">Scheduled</span>'
            };
            return badges[status] || '<span class="badge bg-secondary">Unknown</span>';
        }

        // Format date
        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }

        // Load students
        async function loadStudents() {
            try {
                const response = await fetch('/api/method/education.education.api.push_notifications.get_student_list');
                const data = await response.json();
                
                if (data.message && data.message.success) {
                    students = data.message.students;
                }
            } catch (error) {
                console.error('Error loading students:', error);
            }
        }

        // Load student groups
        async function loadStudentGroups() {
            try {
                const response = await fetch('/api/method/education.education.api.push_notifications.get_student_groups');
                const data = await response.json();
                
                if (data.message && data.message.success) {
                    studentGroups = data.message.student_groups;
                }
            } catch (error) {
                console.error('Error loading student groups:', error);
            }
        }

        // Handle target type change
        function handleTargetTypeChange() {
            const targetType = document.getElementById('target-type').value;
            const targetSelection = document.getElementById('target-selection');
            const targetOptions = document.getElementById('target-options');
            
            if (targetType === 'all_students') {
                targetSelection.style.display = 'none';
            } else {
                targetSelection.style.display = 'block';
                
                if (targetType === 'specific_students') {
                    targetOptions.innerHTML = generateStudentCheckboxes();
                } else if (targetType === 'student_groups') {
                    targetOptions.innerHTML = generateStudentGroupCheckboxes();
                }
            }
        }

        // Generate student checkboxes
        function generateStudentCheckboxes() {
            let html = '<div class="row">';
            students.forEach((student, index) => {
                html += `
                    <div class="col-md-6 mb-2">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="${student.name}" id="student-${index}">
                            <label class="form-check-label" for="student-${index}">
                                ${student.student_name || student.name}
                            </label>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            return html;
        }

        // Generate student group checkboxes
        function generateStudentGroupCheckboxes() {
            let html = '<div class="row">';
            studentGroups.forEach((group, index) => {
                html += `
                    <div class="col-md-6 mb-2">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="${group.name}" id="group-${index}">
                            <label class="form-check-label" for="group-${index}">
                                ${group.group_name} (${group.academic_year})
                            </label>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            return html;
        }

        // Handle form submit
        async function handleFormSubmit(event) {
            event.preventDefault();
            
            const formData = {
                title: document.getElementById('title').value,
                message: document.getElementById('message').value,
                category: document.getElementById('category').value,
                priority: document.getElementById('priority').value,
                target_type: document.getElementById('target-type').value,
                include_parents: document.getElementById('include-parents').checked,
                include_teachers: document.getElementById('include-teachers').checked
            };
            
            // Get selected targets
            const targetType = formData.target_type;
            let endpoint = '';
            let additionalData = {};
            
            if (targetType === 'all_students') {
                endpoint = 'send_notification_to_all_students';
                additionalData = {
                    include_parents: formData.include_parents,
                    include_teachers: formData.include_teachers
                };
            } else if (targetType === 'specific_students') {
                const selectedStudents = Array.from(document.querySelectorAll('#target-options input[type="checkbox"]:checked'))
                    .map(cb => cb.value);
                
                if (selectedStudents.length === 0) {
                    alert('Please select at least one student');
                    return;
                }
                
                endpoint = 'send_notification_to_students';
                additionalData = { students: selectedStudents };
            } else if (targetType === 'student_groups') {
                const selectedGroups = Array.from(document.querySelectorAll('#target-options input[type="checkbox"]:checked'))
                    .map(cb => cb.value);
                
                if (selectedGroups.length === 0) {
                    alert('Please select at least one student group');
                    return;
                }
                
                endpoint = 'send_notification_to_student_groups';
                additionalData = {
                    student_groups: selectedGroups,
                    include_parents: formData.include_parents,
                    include_teachers: formData.include_teachers
                };
            }
            
            // Show loading modal
            loadingModal.show();
            
            try {
                const response = await fetch(`/api/method/education.education.api.push_notifications.${endpoint}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Frappe-CSRF-Token': frappe.csrf_token
                    },
                    body: JSON.stringify({
                        ...formData,
                        ...additionalData
                    })
                });
                
                const data = await response.json();
                
                if (data.message && data.message.success) {
                    alert(`Notification sent successfully! Sent to ${data.message.sent_count} devices. ${data.message.failed_count} failed.`);
                    document.getElementById('notification-form').reset();
                    document.getElementById('target-selection').style.display = 'none';
                    loadStats();
                    loadRecentNotifications();
                } else {
                    alert('Failed to send notification: ' + (data.message?.message || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error sending notification:', error);
                alert('Failed to send notification: ' + error.message);
            } finally {
                loadingModal.hide();
            }
        }

        // Send test notification
        async function sendTestNotification() {
            try {
                const response = await fetch('/api/method/education.education.api.push_notifications.test_notification', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Frappe-CSRF-Token': frappe.csrf_token
                    }
                });
                
                const data = await response.json();
                
                if (data.message && data.message.success) {
                    alert('Test notification sent successfully!');
                } else {
                    alert('Failed to send test notification: ' + (data.message?.message || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error sending test notification:', error);
                alert('Failed to send test notification: ' + error.message);
            }
        }
    </script>
</body>
</html>
