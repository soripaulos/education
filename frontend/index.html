<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Student Portal for Frappe Education">
    <meta name="theme-color" content="#4F46E5">
    
    <!-- PWA related tags -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Frappe Education">
    
    <!-- Apple touch icons -->
    <link rel="apple-touch-icon" href="/pwa-icons/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/pwa-icons/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/pwa-icons/icon-192x192.png">
    <link rel="apple-touch-icon" sizes="167x167" href="/pwa-icons/icon-152x152.png">
    
    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileColor" content="#4F46E5">
    <meta name="msapplication-TileImage" content="/pwa-icons/icon-144x144.png">
    
    <title>Frappe Education</title>
  </head>
  <body>
    <div id="app"></div>
    <div id="modals"></div>
    <div id="popovers"></div>

    <script>
      window.csrf_token = '{{ frappe.session.csrf_token }}'
      window.document.title = '{{ abbr }}'
      let link = document.querySelector("link[rel~='icon']");
      if (!link) {
        link = document.createElement('link');
        link.rel = 'icon';
        document.getElementsByTagName('head')[0].appendChild(link);
      }
      link.href = '{{ logo }}'
    </script>
    <script type="module" src="/src/main.js"></script>
    
    <!-- Fallback for browsers without JavaScript -->
    <noscript>
      <div style="text-align: center; padding: 2rem;">
        <h1>JavaScript Required</h1>
        <p>This application requires JavaScript to function. Please enable JavaScript in your browser settings.</p>
      </div>
    </noscript>
  </body>
</html>
